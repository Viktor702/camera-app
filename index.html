<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Режим доски</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0a0f1f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 12px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    h2 {
      margin: 8px 0 16px;
      font-size: 30px;
    }

    .panel {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      text-align: left;
    }

    .panel-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 13px 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
    }

    video {
      width: 100%;
      border-radius: 18px;
      background: black;
      display: block;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    .green { background: #22c55e; }
    .blue { background: #3b82f6; }
    .purple { background: #8b5cf6; }
    .red { background: #ef4444; }
    .orange { background: #f59e0b; }
    .gray { background: #64748b; }

    .status {
      margin-top: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      line-height: 1.5;
      font-size: 15px;
    }

    .preview {
      margin-top: 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      display: none;
    }

    .preview.show {
      display: block;
    }

    .preview img {
      width: 100%;
      border-radius: 14px;
      display: block;
      margin-top: 10px;
    }

    .meta {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    canvas {
      display: none;
    }

    @media (max-width: 640px) {
      h2 { font-size: 25px; }
      .buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Режим доски</h2>

    <div class="panel">
      <div class="panel-title">Данные доски</div>
      <input id="board" placeholder="Номер доски">
      <input id="white" placeholder="Белые">
      <input id="black" placeholder="Чёрные">
      <input id="server" value="http://192.168.2.51:8000/upload" placeholder="Адрес сервера">
      <div class="meta">
        Телефон только снимает и отправляет кадры. Анализ делает отдельный компьютер.
      </div>
    </div>

    <video id="video" autoplay playsinline muted></video>

    <div class="buttons">
      <button class="green" onclick="startCamera()">Включить камеру</button>
      <button class="blue" onclick="switchCamera()">Сменить камеру</button>
      <button class="purple" onclick="makePhoto()">Сделать фото</button>
      <button class="orange" onclick="sendOne()">Отправить один кадр</button>
      <button class="green" onclick="startAuto()">Старт авто 1 сек</button>
      <button class="red" onclick="stopAuto()">Стоп авто</button>
    </div>

    <div class="status" id="status">
      Статус: готово<br>
      Камера: задняя<br>
      Авто: выключено
    </div>

    <div class="preview" id="previewBox">
      <div class="panel-title">Последний кадр</div>
      <img id="previewImg" alt="Последний кадр">
    </div>

    <canvas id="canvas"></canvas>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusBox = document.getElementById("status");
    const previewBox = document.getElementById("previewBox");
    const previewImg = document.getElementById("previewImg");

    let currentStream = null;
    let facingMode = "environment";
    let lastBlob = null;
    let autoTimer = null;
    let autoRunning = false;
    let isSending = false;
    let sentCount = 0;

    function updateStatus(extra = "") {
      const cameraText = facingMode === "environment" ? "задняя" : "передняя";
      const autoText = autoRunning ? "включено (1 кадр/сек)" : "выключено";

      statusBox.innerHTML =
        "Статус: " + extra + "<br>" +
        "Камера: " + cameraText + "<br>" +
        "Авто: " + autoText + "<br>" +
        "Отправлено кадров: " + sentCount;
    }

    async function startCamera(mode = facingMode) {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          updateStatus("браузер не поддерживает камеру");
          return;
        }

        stopCameraOnly();

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: mode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        currentStream = stream;
        video.srcObject = stream;
        facingMode = mode;

        updateStatus("камера включена");
      } catch (e) {
        updateStatus("ошибка камеры: " + e.message);
      }
    }

    function stopCameraOnly() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
      video.srcObject = null;
    }

    async function switchCamera() {
      const nextMode = facingMode === "environment" ? "user" : "environment";
      await startCamera(nextMode);
    }

    async function captureBlob() {
      if (!video.srcObject) {
        updateStatus("сначала включи камеру");
        return null;
      }

      const width = video.videoWidth || 1280;
      const height = video.videoHeight || 720;

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.85));
      return blob;
    }

    async function makePhoto() {
      const blob = await captureBlob();
      if (!blob) return;

      lastBlob = blob;

      const url = URL.createObjectURL(blob);
      previewImg.src = url;
      previewBox.classList.add("show");

      updateStatus("фото сделано");
    }

    async function sendOne() {
      if (isSending) return;

      const server = document.getElementById("server").value.trim();
      if (!server) {
        updateStatus("укажи адрес сервера");
        return;
      }

      const blob = await captureBlob();
      if (!blob) return;

      lastBlob = blob;

      try {
        isSending = true;

        const form = new FormData();
        form.append("image", blob, "frame.jpg");
        form.append("board", document.getElementById("board").value);
        form.append("white", document.getElementById("white").value);
        form.append("black", document.getElementById("black").value);

        const response = await fetch(server, {
          method: "POST",
          body: form
        });

        if (!response.ok) {
          throw new Error("сервер ответил " + response.status);
        }

        sentCount++;
        updateStatus("кадр отправлен");
      } catch (e) {
        updateStatus("ошибка отправки: " + e.message);
      } finally {
        isSending = false;
      }
    }

    function startAuto() {
      if (autoRunning) return;

      autoRunning = true;
      updateStatus("авторежим запущен");

      autoTimer = setInterval(async () => {
        if (isSending) return;
        await sendOne();
      }, 1000);
    }

    function stopAuto() {
      autoRunning = false;

      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }

      updateStatus("авторежим остановлен");
    }

    updateStatus("готово");
  </script>
</body>
</html>
