<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Camera</title>
</head>

<body style="margin:0;background:#0a0f1f;color:white;font-family:sans-serif;text-align:center;padding:10px">

<h2>Режим доски</h2>

<input id="board" placeholder="Номер доски"><br><br>
<input id="white" placeholder="Белые"><br><br>
<input id="black" placeholder="Чёрные"><br><br>

<input id="server" value="http://192.168.1.100:8000/upload" style="width:90%"><br><br>

<video id="video" autoplay playsinline style="width:100%"></video>

<br><br>

<button onclick="start()">Включить</button>
<button onclick="photo()">Фото</button>
<button onclick="send()">Отправить</button>

<p id="status">Статус: готово</p>

<canvas id="canvas" style="display:none"></canvas>

<script>
let lastImage = null;

async function start() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  document.getElementById("video").srcObject = stream;
}

function photo() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  lastImage = canvas.toDataURL("image/jpeg");

  document.getElementById("status").innerText = "Фото сделано";
}

async function send() {
  if (!lastImage) {
    alert("Сначала сделай фото");
    return;
  }

  const blob = await (await fetch(lastImage)).blob();

  const form = new FormData();
  form.append("image", blob);
  form.append("board", document.getElementById("board").value);
  form.append("white", document.getElementById("white").value);
  form.append("black", document.getElementById("black").value);

  try {
    await fetch(document.getElementById("server").value, {
      method: "POST",
      body: form
    });

    document.getElementById("status").innerText = "Отправлено на компьютер";
  } catch(e) {
    document.getElementById("status").innerText = "Ошибка отправки";
  }
}
</script>

</body>
</html>
